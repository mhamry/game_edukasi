<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halaman Utama</title>
    <style>
      * {
        padding: 0;
        margin: 0;
      }

      body {
        box-sizing: border-box;
        overflow: hidden;
      }
      .container {
        text-align: center;
        padding-top: 50px;
        width: 100%;
        min-height: 100vh;
        position: relative;
        overflow: hidden;
        box-sizing: border-box;
        color: #fff;
      }

      .container::after {
        position: absolute;
        content: "";
        inset: 0;
        background-image: url(image/bg.png);
        background-position: center;
        background-size: cover;
        z-index: -1;
      }

      h1 {
        font-family: "Franklin Gothic Medium", "Arial Narrow", Arial, sans-serif;
        font-size: 60px;
        margin-bottom: 50px;
        margin-top: 100px;
        z-index: 9999;
        color: #fff;
      }

      h1 span {
        font-size: 30px;
      }

      .judul1 {
        font-size: 45px;
        font-family: "Times New Roman", Times, serif;
        margin-bottom: 80px;
        z-index: 9999;
        color: #fff;
      }

      .tombol {
        width: 200px;
        height: 70px;
        margin: 50px auto;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: greenyellow;
        border-radius: 20px;
        border: 5px solid white;
        cursor: pointer;
        transition: 0.3s;
        z-index: 9999;
      }

      .tombol:hover {
        background-color: yellow;
        transform: scale(1.02);
      }

      .tombol a {
        text-decoration: none;
        color: black;
        font-size: 18px;
        font-weight: bold;
        z-index: 9999;
        color: black;
      }

      @media (max-width: 600px) {
        h1 {
          font-size: 30px;
        }

        h1 span {
          font-size: 20px;
        }

        .judul1 {
          font-size: 25px;
        }

        .tombol {
          width: 140px;
          height: 50px;
          font-size: 7px;
        }
        .tombol a {
          font-size: 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1><span>HARDIKNAS 2026</span> <br />PGRI KABUPATEN PASAMAN BARAT</h1>
      <p class="judul1">Gim Edukasi Interaktif</p>
      <p style="font-weight: bold; margin-bottom: 20px">Oleh M.Hamri,S.Pd.Ing <br />SMPN2 Koto Balingka</p>

      <p class="tombol"><a href="menu.html">PILIH MENU GAME</a></p>
    </div>
  </body>
</html>
